# M5 ablation base config. `scripts/ablate.py` copies this, overrides one axis
# (e.g. model.pos_encoding), and stamps a per-seed run.
#
# REDUCED SCALE (ADR-015): 20k steps (vs M3's 100k) on the full corpus. Ablations
# measure *relative* effects, so we trade absolute quality for ~5x cheaper runs
# and can afford ≥2 seeds per variant. Everything else matches the M3 base so the
# ablated axis is the only thing that changes.
run_name: m5-ablation      # overridden per-variant by ablate.py
seed: 1                    # overridden per-seed

data:
  train: data/processed/train.jsonl
  valid: data/processed/valid.jsonl
  bin_dir: data/processed/tok      # the M3-pretokenized 16k binaries
  max_src_len: 128
  max_tgt_len: 128

tokenizer:
  path: data/processed/tokenizer-16k.json
  vocab_size: 16000

model:
  d_model: 512
  n_heads: 8
  d_ff: 2048
  encoder_layers: 6
  decoder_layers: 6
  dropout: 0.1
  pos_encoding: rope
  tie_embeddings: three_way
  norm: pre

train:
  tokens_per_batch: 12000
  grad_accum_steps: 2
  max_steps: 20000         # reduced for ablations
  lr: 5.0e-4
  warmup_steps: 2000       # scaled down from 4000 for the shorter run
  label_smoothing: 0.1
  precision: bf16
  compile: true
  checkpoint_every: 999999 # keep only final.pt (disk: 14+ runs x 627MB)
  eval_every: 2500
  log_every: 100

wandb:
  project: kanjiland
  tags: [m5, ablation]
